<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="IncidentWise">
  <title>IncidentWise</title>
  <desc>Safety warning triangle containing a hard hat with goggles.</desc>
  <defs>
    <linearGradient id="iw-amber-icon" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a03c"/>
      <stop offset="1" stop-color="#ef6c2a"/>
    </linearGradient>
  </defs>

  <!-- same triangle, slightly heavier stroke so it survives 16px -->
  <path d="M32 6 L58 54 L6 54 Z"
        fill="none" stroke="url(#iw-amber-icon)" stroke-width="5.5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <g fill="#160f05">
    <!-- helmet, enlarged (hands removed for legibility) -->
    <path d="M20.5 34a11.5 11.5 0 0 1 23 0z"/>
    <rect x="16" y="33.2" width="32" height="4.6" rx="2.3"/>
    <rect x="30.9" y="23.4" width="2.2" height="10" rx="1.1" fill="#fff" opacity=".95"/>

    <!-- goggles, thickened -->
    <path d="M21.5 40.2h21a3 3 0 0 1 3 3v3.6a3 3 0 0 1-3 3h-21a3 3 0 0 1-3-3v-3.6a3 3 0 0 1 3-3z"/>
    <path d="M23 43.1h7.4a1.8 1.8 0 0 1 1.6.9 1.8 1.8 0 0 1 1.6-.9H41a1.2 1.2 0 0 1 1.2 1.2v1.7a1.2 1.2 0 0 1-1.2 1.2h-7.4a1.8 1.8 0 0 1-1.6-.9 1.8 1.8 0 0 1-1.6.9H23a1.2 1.2 0 0 1-1.2-1.2v-1.7A1.2 1.2 0 0 1 23 43.1z" fill="#fff"/>
  </g>
</svg>
