<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64" role="img" aria-label="IncidentWise">
  <title>IncidentWise</title>
  <desc>Safety warning triangle containing a hard hat with goggles, with three raised hands taking the safety pledge.</desc>
  <defs>
    <linearGradient id="iw-amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f0a03c"/>
      <stop offset="1" stop-color="#ef6c2a"/>
    </linearGradient>
  </defs>

  <!-- rounded warning triangle (round linejoin gives the corner radius) -->
  <path d="M32 7 L57 53 L7 53 Z"
        fill="none" stroke="url(#iw-amber)" stroke-width="5"
        stroke-linejoin="round" stroke-linecap="round"/>

  <g fill="#160f05">
    <!-- hard hat: dome + brim -->
    <path d="M23.5 30.5a8.5 8.5 0 0 1 17 0z"/>
    <rect x="19.5" y="30" width="25" height="3.6" rx="1.8"/>
    <!-- crown ribs (knocked out of the dome) -->
    <rect x="31.2" y="22.6" width="1.6" height="7.4" rx="0.8" fill="#fff" opacity=".95"/>
    <rect x="26.6" y="24.6" width="1.3" height="5.4" rx="0.65" fill="#fff" opacity=".6"/>
    <rect x="36.1" y="24.6" width="1.3" height="5.4" rx="0.65" fill="#fff" opacity=".6"/>

    <!-- goggles: band + lens (lens knocked out) -->
    <path d="M23.5 35.6h17a2.6 2.6 0 0 1 2.6 2.6v3.4a2.6 2.6 0 0 1-2.6 2.6h-17a2.6 2.6 0 0 1-2.6-2.6v-3.4a2.6 2.6 0 0 1 2.6-2.6z"/>
    <path d="M24.6 37.7h6.1a1.6 1.6 0 0 1 1.3.7 1.6 1.6 0 0 1 1.3-.7h6.1a1 1 0 0 1 1 1v1.4a1 1 0 0 1-1 1h-6.1a1.6 1.6 0 0 1-1.3-.7 1.6 1.6 0 0 1-1.3.7h-6.1a1 1 0 0 1-1-1v-1.4a1 1 0 0 1 1-1z" fill="#fff"/>
    <!-- side straps -->
    <rect x="18.6" y="38.4" width="2.4" height="2.6" rx="0.8"/>
    <rect x="43" y="38.4" width="2.4" height="2.6" rx="0.8"/>

    <!-- three raised pledge hands, clear of the goggles -->
    <g>
      <!-- left hand (lower) -->
      <g transform="translate(21.4 47.6) scale(0.82)">
        <rect x="0" y="4.2" width="6.8" height="8" rx="2.2"/>
        <rect x="0.5" y="0.8" width="1.5" height="4.6" rx="0.75"/>
        <rect x="2.6" y="0" width="1.5" height="5.4" rx="0.75"/>
        <rect x="4.7" y="0.8" width="1.5" height="4.6" rx="0.75"/>
        <rect x="6.3" y="3.1" width="1.5" height="4.2" rx="0.75" transform="rotate(22 7.05 5.2)"/>
      </g>
      <!-- centre hand (highest) -->
      <g transform="translate(28.6 45.4)">
        <rect x="0" y="4.2" width="6.8" height="8.6" rx="2.2"/>
        <rect x="0.5" y="0.6" width="1.6" height="4.8" rx="0.8"/>
        <rect x="2.6" y="-0.3" width="1.6" height="5.7" rx="0.8"/>
        <rect x="4.7" y="0.6" width="1.6" height="4.8" rx="0.8"/>
        <rect x="6.3" y="3" width="1.6" height="4.4" rx="0.8" transform="rotate(22 7.1 5.2)"/>
      </g>
      <!-- right hand (lower) -->
      <g transform="translate(36.4 47.6) scale(0.82)">
        <rect x="0" y="4.2" width="6.8" height="8" rx="2.2"/>
        <rect x="0.5" y="0.8" width="1.5" height="4.6" rx="0.75"/>
        <rect x="2.6" y="0" width="1.5" height="5.4" rx="0.75"/>
        <rect x="4.7" y="0.8" width="1.5" height="4.6" rx="0.75"/>
        <rect x="6.3" y="3.1" width="1.5" height="4.2" rx="0.75" transform="rotate(22 7.05 5.2)"/>
      </g>
    </g>
  </g>
</svg>
